name: Plugin Scanner

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run HOL plugin scanner
        run: |
          python -m pip install --user pipx
          python -m pipx run plugin-scanner lint .
          python -m pipx run plugin-scanner verify .
          python -m pipx run plugin-scanner scan . --min-score 80 --fail-on-severity high
